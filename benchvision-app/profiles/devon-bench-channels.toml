# =============================================================================
# BENCH CHANNEL MAP + SENSOR REGISTRY  —  Devon's pump bench (FTS / PC9000)
# =============================================================================
# ✅ VERIFIED 2026-06-15. Promoted from devon-bench-channels.draft.toml.
#
# This is a NEW artefact type, distinct from a pump profile:
#   • A PUMP PROFILE (e.g. pc200-8-hpv95.toml) = pump-specific chart data,
#     acceptance bands, and which derived formula computes flow/torque/power.
#   • THIS FILE = the BENCH's physical channel map + per-channel sensor registry
#     (what sensor sits on each channel, its signal type, scaling, calibration
#     traceability, and safety semantics). Bench-specific, pump-agnostic.
#
# WHAT CHANGED vs the 0.1 draft (provenance now solid):
#   • Channel scaling/ranges/units are LOCKED against the *verbatim* cal table
#     (config/cal.txt) from the 2026-06-12 bench capture — not the photo. Every
#     one of the 16 channels matched the draft 1:1, so the ranges below are the
#     bench's own numbers, verbatim.
#   • Units NORMALISED to convention (see [units]); each channel keeps its
#     verbatim `raw_label` for traceability.
#   • Sensor identity + calibration traceability filled from the on-file cal
#     certs where they exist (Flo-tech flow, MP Filtri ICM). Channels with no
#     cert remain photo-sourced or `tbc` — nothing invented.
#   • Per-channel SAFETY-SEMANTICS added (de-energisation / safe-to-approach) —
#     see [safety] and the `safe_below` / `is_deenergisation_gate` fields.
#     Thresholds are PROVISIONAL pending Devon's bleed-down answer (TASKS.md).
#
# SOURCES:
#   • config/cal.txt (verbatim) — bench-capture-2026-06-12. 16-channel scaling.
#   • Flo-tech flow cert  — devon-reference/new-bench/Flo-tech/badge-meter_calibration-certificate.pdf
#   • MP Filtri ICM cert  — devon-reference/new-bench/ICM/ICM-calibration-certificate.pdf
#   • Gems 3100 identity  — Devon hardware photos 2026-06-10 (no cert on file).
#   • WALKTHROUGH.md      — bench-capture-2026-06-12 (channel reconciliation, §2).
#
# NOTE on legacy scaling: cal.txt's raw Min/Max Input figures (e.g. 0.4–2.0,
# 0.021–5) belong to the OLD PC9000 DDE DAQ (serial COM1, confirmed from
# pump.reg) and are recorded as `legacy_input` for reference only. The NEW
# BenchVision DAQ (LabJack T7, see [daq]) re-scales from each sensor's own
# native output, so production scaling is defined by the sensor + calibration
# blocks, not these legacy numbers.
# British English throughout.
# =============================================================================

schema_version = "1.0-verified"

[meta]
bench_id      = "devon-fts-pump"
display_name  = "Devon's pump test bench (FTS / PC9000 — legacy, being replaced)"
channel_count = 16                 # analogue channels in cal.txt; ICM is separate (RS485)
verified_date = "2026-06-15"
source_cal_file = "benchvision-working/devon-reference/bench-capture-2026-06-12/config/cal.txt"
provenance    = "Scaling/ranges/units VERIFIED against verbatim cal.txt (2026-06-12 capture). Sensor identity + cal traceability from on-file certs where available; remainder photo-sourced or tbc."
status        = "VERIFIED scaling/units; sensor identities partial; safety thresholds provisional (see [open_items])"
legacy_daq    = "PC9000 DDE on serial COM1 (from pump.reg HKLM\\SOFTWARE\\ftspump comport=1); Windows XP host"

# -----------------------------------------------------------------------------
# UNIT-CASING CONVENTION (applied to every `unit` below; `raw_label` keeps the
# verbatim cal.txt casing for traceability).
#   • Unit symbols are lowercase UNLESS named after a person.
#   • "bar"   — always lowercase (not a personal name). cal.txt's "Bar" → "bar".
#   • "kW"    — lowercase k (kilo) + capital W (Watt is a person). "KW" → "kW".
#   • "L/min" — litre may be l or L; NIST/IEEE prefer capital L to avoid 1/l
#               confusion. cal.txt's "l/min" (ch14) normalised up to "L/min".
#   • "RPM"   — not SI (SI-style is r/min). Kept as RPM to match Devon's bench
#               house style; switch to "rpm" project-wide if preferred.
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# DAQ — how BenchVision reads the bench. DECISION OPEN (LabJack T7 leading).
# 4–20 mA channels: 249/250 Ω burden resistor → voltage (4 mA→~1 V, 20 mA→~5 V):
#   eng = range_min + (range_max - range_min) * (volts - 1.0) / 4.0
# 0–5 V channels: read direct on a LabJack AIN.
# RS485 (ICM): separate USB-to-RS485 adapter, Modbus RTU (see [icm]).
# -----------------------------------------------------------------------------
[daq]
device          = "LabJack T7"     # ⚠ DECISION OPEN — see TASKS.md (Pi 4 demo fallback, NI USB-6001 third)
analog_inputs   = 14               # T7 native AINs; bench uses 16 → expansion/multiplex needed (FLAG below)
burden_ohms     = 249.0            # for 4–20 mA channels
rs485_adapter   = "USB-to-RS485 (FTDI-class)"  # for the ICM
legacy_interface = "RS-232 serial COM1"        # the PC9000 DDE DAQ a replacement PC must still reach until T7 cutover
# NOTE: 16 analogue channels > 14 native T7 AINs. Resolve at hardware-spec time
# (T7 + expansion, T7-Pro, or drop unused channels for the MVP).

# -----------------------------------------------------------------------------
# SAFETY SEMANTICS — distinguishing COMMANDED-OFF from ACTUALLY DE-ENERGISED.
# The sequencer's terminal states (COMPLETE/ABORT) are *record* outcomes; they
# do NOT prove the bench is physically safe. A channel marked
# `is_deenergisation_gate = true` must read at or below its `safe_below` value
# (held for `settle_seconds`) before the bench may report SAFE-TO-APPROACH; until
# then a residual-energy indicator stays AMBER. See the matching build task +
# the Devon bleed-down question in TASKS.md.
#
# ⚠ PROVISIONAL THRESHOLDS — placeholders, not Devon-confirmed. Do not treat as
# settled until the bleed-down / accumulator / coast-down answer lands.
# -----------------------------------------------------------------------------
[safety]
enabled                 = true
indicator_default       = "amber"     # safe only on positive confirmation, never by assumption
settle_seconds          = 5.0         # provisional: hold within safe band this long before asserting SAFE
pressure_safe_below_bar = 5.0         # provisional near-zero residual-pressure band
speed_safe_below_rpm    = 10.0        # provisional rotation-ceased band
note = "Thresholds + which lines truly gate are PROVISIONAL pending Devon (does the bench hold accumulator pressure; auto-vent vs manual dump; coast-down time)."

