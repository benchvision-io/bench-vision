# =============================================================================
# BENCH CHANNEL MAP + SENSOR REGISTRY  —  Devon's pump bench (FTS/PC9000)
# =============================================================================
# ⚠ DRAFT / PROVISIONAL — first cut, 2026-06-10.
#
# This is a NEW artefact type, distinct from a pump profile:
#   • A PUMP PROFILE (e.g. pc200-8-hpv95.toml) = pump-specific chart data,
#     acceptance bands, and which derived formula computes flow/torque/power.
#   • THIS FILE = the BENCH's physical channel map + per-channel sensor registry
#     (what sensor sits on each channel, its signal type, scaling, and
#     calibration traceability). Bench-specific, pump-agnostic.
#
# SOURCE (provisional, verify before relying on it):
#   • Channel list + engineering ranges/units: photo of Devon's existing `cal`
#     config (16 channels), transcribed in
#     demo-simulation/devon-existing-bench-system-2026-06-10.md — NOT yet the
#     verbatim file (collector script pending; see TASKS.md).
#   • Instrument identities: Devon's hardware photos 2026-06-10.
#   • Signal types / DAQ wiring: benchvision-working/devon-reference/new-bench/
#     DAQ-hardware-options.md (signal inventory) + ICM-modbus-integration-brief.md.
#
# WHAT'S SOLID vs TBC:
#   • Channel roles, engineering ranges and units — read from the cal table (solid).
#   • Flow = Hydrotechnik RE 4-600; ch10/11 Pressure A/B = Gems 3100 (0–5 V);
#     cleanliness = MP Filtri ICM 2.0 — identified from photos/labels (solid).
#   • The specific sensor on most pressure channels, and several signal types,
#     are TBC — fill from the returned config files + the calibration certificates
#     in benchvision-working/sensors-literature/ and …/new-bench/.
#
# NOTE on legacy scaling: the cal table's raw Min/Max Input figures (e.g. 0.4–2,
# 0.021–5) belong to the OLD PC9000 DAQ and are recorded here as `legacy_input`
# for reference only. The NEW BenchVision DAQ (LabJack T7, see [daq]) re-scales
# from each sensor's own native output, so production scaling is defined by the
# sensor block, not these legacy numbers.
# British English throughout.
# =============================================================================

schema_version = "0.1-draft"

[meta]
bench_id      = "devon-fts-pump"
display_name  = "Devon's pump test bench (FTS / PC9000 — legacy)"
channel_count = 16                 # analogue channels in the cal table; ICM is separate (RS485)
provenance    = "cal-table photo + hardware photos 2026-06-10; see decision-log 2026-06-10"
status        = "PROVISIONAL — verify against verbatim config files + cal certs"

# -----------------------------------------------------------------------------
# DAQ — how BenchVision reads the bench. DECISION OPEN (LabJack T7 leading).
# 4–20 mA channels: 249/250 Ω burden resistor → voltage, 4 mA→1 V, 20 mA→5 V.
#   eng = range_min + (range_max - range_min) * (volts - 1.0) / 4.0
# 0–5 V channels: read direct on a LabJack AIN.
# RS485 (ICM): separate USB-to-RS485 adapter, Modbus RTU (see icm block).
# -----------------------------------------------------------------------------
[daq]
device          = "LabJack T7"     # ⚠ DECISION OPEN — see TASKS.md (Pi 4 demo fallback, NI USB-6001 third)
analog_inputs   = 14               # T7; Devon's bench uses 16 analogue ch → expansion or multiplex needed (FLAG)
burden_ohms     = 249.0            # for 4–20 mA channels
rs485_adapter   = "USB-to-RS485 (FTDI-class)"  # for the ICM

# NOTE: 16 analogue channels > 14 native T7 AINs. Resolve at hardware-spec time
# (T7 + expansion, T7-Pro, or drop unused channels for the MVP). Flagged for the
# open DAQ decision.

# -----------------------------------------------------------------------------
# Signal-type vocabulary (for the `signal` field below):
#   "current_4_20mA"  — 4–20 mA current loop (needs burden resistor)
#   "voltage_0_5V"    — 0–5 V
#   "voltage_0_10V"   — 0–10 V
#   "frequency"       — pulse/frequency (e.g. turbine/gear flow, speed)
#   "modbus_rs485"    — digital (ICM)
#   "derived"         — computed, not a physical sensor
#   "tbc"             — to be confirmed
# -----------------------------------------------------------------------------

